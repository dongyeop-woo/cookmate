# Server
server.port=${PORT:8080}

# Firebase
firebase.credentials-path=classpath:firebase-service-account.json
firebase.database-id=cookmate
firebase.storage-bucket=cookingbasedyw.firebasestorage.app

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail (Naver SMTP)
spring.mail.host=smtp.naver.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:twentyvi@naver.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
app.admin.email=${ADMIN_EMAIL:twentyvi@naver.com}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8081,http://localhost:19006,http://localhost:3000,https://yojalal.com,https://yojalal.pages.dev}

# HACCP (한국식품안전관리인증원) - 공공데이터 포털 Open API
# 키는 환경변수 또는 application-local.properties에서 주입 (절대 하드코딩 금지)
haccp.service-key=${HACCP_SERVICE_KEY:}
haccp.base-url=https://apis.data.go.kr/B553748/CertImgListServiceV3

# 식약처 식품영양성분 DB (공공데이터포털 OpenAPI)
# 생식재료 커버리지용 — HACCP에서 찾을 수 없는 채소/육류/생선 등
nutri.service-key=${NUTRI_SERVICE_KEY:}
nutri.base-url=${NUTRI_BASE_URL:https://apis.data.go.kr/1471000/FoodNtrCpntDbInfo02}

# Giftishow Biz API — auth는 환경변수, 카탈로그 ID는 하드코딩
giftishow.auth-code=${GIFTISHOW_AUTH_CODE:}
giftishow.auth-token=${GIFTISHOW_AUTH_TOKEN:}
giftishow.user-id=${GIFTISHOW_USER_ID:}
giftishow.banner-id=202604130320766
giftishow.card-id=202604130375256

# Solapi (\uce74\uce74\uc624 \uc54c\ub9bc\ud1a1)
# SOLAPI_API_KEY / SOLAPI_API_SECRET \ud658\uacbd\ubcc0\uc218\uc5d0 \uc124\uc815 (Cloud Run \uc2dc\ud06c\ub9bf\uc73c\ub85c \uad00\ub9ac \uad8c\uc7a5)
solapi.api-key=${SOLAPI_API_KEY:}
solapi.api-secret=${SOLAPI_API_SECRET:}
# \ubc1c\uc2e0 \ud504\ub85c\ud544 ID (Solapi \ub300\uc2dc\ubcf4\ub4dc \u2192 \uce74\uce74\uc624 \ucc44\ub110 \u2192 \ub0b4 \uce44\ub110 pfId)
solapi.pf-id=${SOLAPI_PF_ID:KA01PF260417151355991QS6ojX042Ny}
# \uc2b9\uc778\ub41c \uc54c\ub9bc\ud1a1 \ud15c\ud50c\ub9bf \ucf54\ub4dc
solapi.template-exchange=${SOLAPI_TEMPLATE_EXCHANGE:KA01TP260417151900873zncBxC2leBU}
# SMS \ubc1c\uc1a1 \uc2e4\ud328 \uc2dc \uc0ac\uc6a9\ud560 \ubc1c\uc2e0\ubc88\ud638 (Solapi\uc5d0 \ub4f1\ub85d\ub41c \ud3f0\ubc88)
solapi.from-number=${SOLAPI_FROM_NUMBER:}

# App 버전 관리 (강제 업데이트) — 보안 패치 배포 시 min-version을 올려 구버전 차단
app.min-version.ios=${APP_MIN_VERSION_IOS:1.0.0}
app.min-version.android=${APP_MIN_VERSION_ANDROID:1.0.0}
app.latest-version.ios=${APP_LATEST_VERSION_IOS:1.0.0}
app.latest-version.android=${APP_LATEST_VERSION_ANDROID:1.0.0}
app.store-url.ios=${APP_STORE_URL_IOS:https://apps.apple.com/app/id0000000000}
app.store-url.android=${APP_STORE_URL_ANDROID:https://play.google.com/store/apps/details?id=com.dyw.cookmate}

# Logging — 프로덕션은 INFO. 디버깅 시 LOG_LEVEL=DEBUG 환경변수로 일시 변경.
# (DEBUG 운영 시 PII가 로그에 남고 Cloud Logging 비용 폭증함)
logging.level.com.devl.api=${LOG_LEVEL:INFO}
